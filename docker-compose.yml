services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: masap_db
    environment:
      POSTGRES_DB: masap_uganc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d masap_uganc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - masap_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masap_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/masap_uganc
      SECRET_KEY: masap-uganc-super-secret-key-change-in-production-2024
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost","http://nginx"]'
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - masap_network
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        python -m scripts.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: masap_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - masap_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: masap_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - masap_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  masap_network:
    driver: bridge
